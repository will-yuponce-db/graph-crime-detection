# Databricks Apps Configuration
# This app connects to Unity Catalog: pubsec_geo_law.demo

command:
  - "bash"
  - "-c"
  - |
    # Install frontend dependencies and build
    npm install
    npm run build
    
    # Install backend dependencies
    cd backend
    npm install
    
    # Start the server
    node server.js

env:
  # Server configuration
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "8000"
  
  # Databricks Unity Catalog configuration
  - name: DATABRICKS_HOST
    value: "fe-vm-industry-solutions-buildathon.cloud.databricks.com"
  - name: DATABRICKS_HTTP_PATH
    value: "/sql/1.0/warehouses/288a7ec183eea397"
  - name: DATABRICKS_CATALOG
    value: "pubsec_geo_law"
  - name: DATABRICKS_SCHEMA
    value: "demo"
  
  # Use Databricks Apps OAuth (automatically provided)
  # The app will use DATABRICKS_TOKEN from the runtime environment

resources:
  # Memory and CPU allocation
  memory: "2Gi"
  cpu: "1"


